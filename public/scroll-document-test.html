<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document scroll test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #203f44;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        padding: 18px 20px;
        background: #18363b;
        border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      main {
        padding: 18px 20px 40px;
      }

      .card {
        min-height: 180px;
        margin: 0 0 18px;
        padding: 20px;
        border-radius: 8px;
        background: #dcf8e9;
        color: #111;
        font-size: 22px;
        font-weight: 700;
      }

      .note {
        color: #d6d6d6;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Document scroll</h1>
    </header>
    <main>
      <p class="note">Здесь прокручивается сама страница: html/body/window.</p>
      <script>
        for (let i = 1; i <= 30; i += 1) {
          document.write(`<section class="card">Карточка ${i}</section>`);
        }
      </script>
    </main>
  </body>
</html>
