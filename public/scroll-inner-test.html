<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inner scroll test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        min-width: 320px;
        overflow: hidden;
        background: #203f44;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100lvh;
        overflow: hidden;
      }

      header {
        flex: 0 0 auto;
        padding: 18px 20px;
        background: #18363b;
        border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      .scrollArea {
        flex: 1 1 auto;
        min-height: 0;
        padding: 18px 20px 40px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .card {
        min-height: 180px;
        margin: 0 0 18px;
        padding: 20px;
        border-radius: 8px;
        background: #dcf8e9;
        color: #111;
        font-size: 22px;
        font-weight: 700;
      }

      .note {
        color: #d6d6d6;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Inner div scroll</h1>
      </header>
      <main class="scrollArea">
        <p class="note">Здесь страница зафиксирована, прокручивается внутренний div.</p>
        <script>
          for (let i = 1; i <= 30; i += 1) {
            document.write(`<section class="card">Карточка ${i}</section>`);
          }
        </script>
      </main>
    </div>
  </body>
</html>
